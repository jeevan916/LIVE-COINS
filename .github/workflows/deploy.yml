name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 72.61.175.20
          username: u477692720.coins.sanghavijewellers.com
          password: ${{ secrets.FTP_PASSWORD || 'Jaímata@916' }}
          local-dir: ./dist/
          server-dir: public_html/
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.git*/**
            node_modules/**
